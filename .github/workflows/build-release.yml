name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Generate timestamp
        id: timestamp
        run: echo "ts=$(date -u +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/*.apk \
             app/build/outputs/apk/debug/ScreenTextCopier_${{ steps.timestamp.outputs.ts }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.timestamp.outputs.ts }}
          name: Build ${{ steps.timestamp.outputs.ts }}
          files: app/build/outputs/apk/debug/ScreenTextCopier_*.apk
